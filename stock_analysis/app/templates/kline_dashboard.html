<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title or 'K线 · 股票分析系统' }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/kline_dashboard.css') }}">
</head>
<body>
    <div class="layout-dashboard">
        <aside class="sidebar-dash">
            <div style="display:flex;justify-content:space-between;align-items:center">
                <h2>导航</h2>
                <a href="{{ url_for('main.index') }}" style="font-size:0.8rem;color:#2563eb;text-decoration:none">首页</a>
            </div>

            <label class="signal-section-title" for="stock-search">检索框，检索股票</label>
            <div class="search-row">
                <input type="text" id="stock-search" placeholder="代码或名称（全市场检索）" autocomplete="off">
            </div>

            <label class="signal-section-title" for="manual-code">手动加载 K 线</label>
            <div class="search-row">
                <input type="text" id="manual-code" placeholder="如 sh600000" autocomplete="off">
                <button type="button" class="btn-small" id="btn-load-manual">加载</button>
            </div>

            <div class="signal-section-title" id="stock-list-title">近期触发买入信号列表</div>
            <div class="list-panel">
                <div class="stock-list" id="stock-list"></div>
                <div class="list-pager" id="list-pager">
                    <div class="pager-row">
                        <button type="button" class="pager-btn" id="pager-prev" disabled>上一页</button>
                        <span class="pager-info" id="pager-info">—</span>
                        <button type="button" class="pager-btn" id="pager-next" disabled>下一页</button>
                    </div>
                    <div class="pager-size-row">
                        <label for="pager-page-size">每页</label>
                        <select id="pager-page-size" class="pager-select">
                            <option value="10">10</option>
                            <option value="20" selected>20</option>
                            <option value="50">50</option>
                        </select>
                        <span>条</span>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-dash">
            <div class="chart-header">
                <h2>K线图</h2>
                <div class="stock-title" id="chart-stock-title">请选择左侧股票</div>
            </div>
            <div class="chart-wrap">
                <div id="chart-main"></div>
            </div>
            <div class="status-bar" id="chart-status"></div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
    <script src="{{ url_for('static', filename='js/kline_dashboard.js') }}"></script>
</body>
</html>
