<!DOCTYPE html>
<html lang="zh-CN" class="kline-dashboard-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title or 'K线 · 股票分析系统' }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/kline_dashboard.css') }}">
</head>
<body class="kline-dashboard-body">
    <div class="layout-dashboard">
        <aside class="sidebar-dash">
            <div style="display:flex;justify-content:space-between;align-items:center">
                <h2>导航</h2>
                <a href="{{ url_for('main.index') }}" style="font-size:0.8rem;color:#2563eb;text-decoration:none">首页</a>
            </div>

            <label class="signal-section-title" for="stock-search">检索框，检索股票</label>
            <div class="search-row">
                <input type="text" id="stock-search" placeholder="代码或名称（全市场检索）" autocomplete="off">
            </div>

            <label class="signal-section-title" for="manual-code">手动加载 K 线</label>
            <div class="search-row">
                <input type="text" id="manual-code" placeholder="如 sh600000" autocomplete="off">
                <button type="button" class="btn-small" id="btn-load-manual">加载</button>
            </div>

            <div class="list-panel">
                <div id="sidebar-normal">
                    <details class="acc-block" open>
                        <summary class="acc-summary">拉升试盘策列</summary>
                        <div class="acc-body" id="wrap-pullup">
                            <div class="acc-scroll-list" id="scroll-pullup">
                                <div class="stock-list stock-list--nested" id="list-pullup"></div>
                            </div>
                            <div class="list-pager" id="pager-pullup-wrap">
                                <div class="pager-row">
                                    <button type="button" class="pager-btn" id="pager-pullup-prev">上一页</button>
                                    <span class="pager-info" id="pager-pullup-info">—</span>
                                    <button type="button" class="pager-btn" id="pager-pullup-next">下一页</button>
                                </div>
                                <div class="pager-size-row">
                                    <label for="pager-pullup-size">每页</label>
                                    <select id="pager-pullup-size" class="pager-select">
                                        <option value="10" selected>10</option>
                                        <option value="20">20</option>
                                        <option value="50">50</option>
                                    </select>
                                    <span>条</span>
                                </div>
                            </div>
                        </div>
                    </details>
                    <details class="acc-block" open>
                        <summary class="acc-summary">启动策列</summary>
                        <div class="acc-body" id="wrap-startup">
                            <div class="acc-scroll-list" id="scroll-startup">
                                <div class="stock-list stock-list--nested" id="list-startup"></div>
                            </div>
                            <div class="list-pager" id="pager-startup-wrap">
                                <div class="pager-row">
                                    <button type="button" class="pager-btn" id="pager-startup-prev">上一页</button>
                                    <span class="pager-info" id="pager-startup-info">—</span>
                                    <button type="button" class="pager-btn" id="pager-startup-next">下一页</button>
                                </div>
                                <div class="pager-size-row">
                                    <label for="pager-startup-size">每页</label>
                                    <select id="pager-startup-size" class="pager-select">
                                        <option value="10" selected>10</option>
                                        <option value="20">20</option>
                                        <option value="50">50</option>
                                    </select>
                                    <span>条</span>
                                </div>
                            </div>
                        </div>
                    </details>
                </div>
                <div id="sidebar-search" hidden>
                    <div class="signal-section-title" id="search-panel-title">检索结果</div>
                    <div class="acc-body acc-body--search" id="wrap-search">
                        <div class="acc-scroll-list acc-scroll-list--search" id="scroll-search">
                            <div class="stock-list stock-list--nested" id="list-search"></div>
                        </div>
                        <div class="list-pager" id="pager-search-wrap">
                            <div class="pager-row">
                                <button type="button" class="pager-btn" id="pager-search-prev">上一页</button>
                                <span class="pager-info" id="pager-search-info">—</span>
                                <button type="button" class="pager-btn" id="pager-search-next">下一页</button>
                            </div>
                            <div class="pager-size-row">
                                <label for="pager-search-size">每页</label>
                                <select id="pager-search-size" class="pager-select">
                                    <option value="10" selected>10</option>
                                    <option value="20">20</option>
                                    <option value="50">50</option>
                                </select>
                                <span>条</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-dash">
            <div class="chart-header">
                <h2>K线图</h2>
                <div class="stock-title" id="chart-stock-title">请选择左侧股票</div>
            </div>
            <div class="chart-wrap">
                <div id="chart-main"></div>
            </div>
            <div class="status-bar" id="chart-status"></div>

            <section class="block-rank-section" aria-labelledby="block-rank-title">
                <div class="block-rank-head">
                    <h3 id="block-rank-title">个股关联概念板块</h3>
                    <div class="block-rank-meta">
                        <span class="block-rank-date-wrap">数据日期 <strong id="block-rank-date">—</strong></span>
                        <span class="block-resonance-wrap">个股对应板块共振指数 <strong id="block-resonance">—</strong></span>
                    </div>
                </div>
                <div class="block-rank-table-scroll">
                    <table class="block-rank-table">
                        <thead>
                            <tr>
                                <th>板块名称</th>
                                <th>强弱度</th>
                                <th>涨幅</th>
                                <th>涨跌数</th>
                                <th>换手</th>
                                <th>主力净比</th>
                                <th>成交量</th>
                                <th>成交额</th>
                                <th>振幅</th>
                                <th>短期形态</th>
                            </tr>
                        </thead>
                        <tbody id="block-rank-tbody"></tbody>
                    </table>
                </div>
                <div class="list-pager block-rank-pager">
                    <div class="pager-row">
                        <button type="button" class="pager-btn" id="pager-block-prev">上一页</button>
                        <span class="pager-info" id="pager-block-info">—</span>
                        <button type="button" class="pager-btn" id="pager-block-next">下一页</button>
                    </div>
                    <div class="pager-size-row">
                        <label for="pager-block-size">每页</label>
                        <select id="pager-block-size" class="pager-select">
                            <option value="10" selected>10</option>
                            <option value="20">20</option>
                            <option value="50">50</option>
                        </select>
                        <span>条</span>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
    <script src="{{ url_for('static', filename='js/kline_dashboard.js') }}"></script>
</body>
</html>
